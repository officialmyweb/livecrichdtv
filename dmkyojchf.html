<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex" />
<title>Telegram-Live-Cric-Hd</title>

<script src="https://cdn.jsdelivr.net/npm/@clappr/player@0.4.0/dist/clappr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mux.js@5.6.7/dist/mux.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/level-selector@latest/dist/level-selector.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clappr-chromecast-plugin@latest/dist/clappr-chromecast-plugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clappr-pip@latest/dist/clappr-pip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@2.5.10/dist/shaka-player.compiled.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/clappr/dash-shaka-playback@latest/dist/dash-shaka-playback.external.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/cdnbye-shaka@latest"></script>

<script src="https://lchdxfootball.pages.dev/sknzx.js"></script>
<script src="https://lchdxfootball.pages.dev/configure.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
}

#player {
  width: 100%;
  height: 100vh;
}

.logo {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 90px;
  z-index: 9999;
  cursor: pointer;
}

#error {
  text-align: center;
  color: red;
  padding-top: 20px;
}
</style>
</head>

<body>
<div id="player"></div>
<div id="error"></div>

<script>
const SECURITY_TELEGRAM = "https://telegram.me/cricxfootball";

const VALID_CHANNELS = [
    "https://telegram.me/livecrichdofficial",
    "https://telegram.me/+WOHjeld4UV9lYWJl",
    "https://telegram.me/+L7agYSmJVRNkZDFl",
    "https://telegram.me/cricxfootball"
];

// SAFE CHECK (fix white screen crash)
if (typeof DOMAIN_CONFIG === "undefined" || typeof TELEGRAM_CONFIG === "undefined") {
    location.href = SECURITY_TELEGRAM;
}

// DOMAIN CHECK
if (
    window.top !== window.self ||
    !DOMAIN_CONFIG.allowedDomains.includes(window.location.hostname)
) {
    location.href = SECURITY_TELEGRAM;
}

// TELEGRAM VALIDATION
if (!VALID_CHANNELS.includes(TELEGRAM_CONFIG.popupChannel)) {
    location.href = SECURITY_TELEGRAM;
}

// TELEGRAM POPUP
setTimeout(() => {
    if (confirm("Join Our Telegram Channel @livecrichdofficial")) {
        window.location.href = TELEGRAM_CONFIG.popupChannel;
    }
}, 1000);

try {

  const TELEGRAM_URL = "https://telegram.me/livecrichdofficial";
  const decryptionKey = "gf676rc7gr4grg76r6ag56gg8f76713f";

  function decryptBase64(encodedStr, key) {
      const decodedBytes = atob(encodedStr);
      let decryptedStr = '';

      for (let i = 0; i < decodedBytes.length; i++) {
          decryptedStr += String.fromCharCode(
              decodedBytes.charCodeAt(i) ^ key.charCodeAt(i % key.length)
          );
      }

      return JSON.parse(decryptedStr);
  }

  const params = new URLSearchParams(window.location.search);
  const channel = params.get("id");

  if (!channel) {
      location.href = TELEGRAM_URL;
      throw new Error("No ID");
  }

  if (typeof encodedChannelData === "undefined") {
      throw new Error("streams.js not loaded");
  }

  if (!encodedChannelData[channel]) {
      location.href = TELEGRAM_URL;
      throw new Error("Invalid ID");
  }

  const decodedData = decryptBase64(encodedChannelData[channel], decryptionKey);

  // IMPORTANT FIX → ensure DRMKeys exists
  if (!decodedData.ManifestURI || !decodedData.DRMKeys) {
      throw new Error("Invalid stream data");
  }

  const player = new Clappr.Player({
      source: decodedData.ManifestURI,
      mimeType: 'application/dash+xml',
      height: '100%',
      width: '100%',

      plugins: [
          LevelSelector,
          DashShakaPlayback,
          ChromecastPlugin,
          ClapprPip.PipButton,
          ClapprPip.PipPlugin
      ],

      chromecast: {
          appId: '9DFB77C0',
          contentType: 'video/mp4'
      },

      shakaConfiguration: {
          drm: {
              clearKeys: decodedData.DRMKeys
          }
      },

      parentId: '#player'
  });

  player.on(Clappr.Events.PLAYER_READY, function() {
      const container = document.querySelector("#player");

      if (container) {
          const logo = document.createElement("img");
          logo.src = "https://i.ibb.co/7VF2dfy/1000000077-removebg-preview.png";
          logo.className = "logo";

          logo.onclick = function() {
              window.location.href = TELEGRAM_URL;
          };

          container.appendChild(logo);
      }
  });

} catch (err) {
  console.error(err);
  document.getElementById("error").innerText = "ERROR: " + err.message;
}
</script>

</body>
</html>
