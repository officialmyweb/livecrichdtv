<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">

<title>M3U8 Test Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.6/controls.min.css">

<style>

body{
margin:0;
background:#000;
height:100%;
}

html{
height:100%;
}

.shaka-video-container{
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div data-shaka-player-container class="shaka-video-container">

<video autoplay playsinline data-shaka-player id="video"></video>

</div>


<script>

async function initPlayer(){

const video=document.getElementById("video");

const ui=video["ui"];
const controls=ui.getControls();
const player=controls.getPlayer();


/* PUT YOUR M3U8 HERE */

const stream="https://islstream.xojiv79335.workers.dev/?id=140992_ENGLISH";


/* SMOOTH STREAM CONFIG */

player.configure({

streaming:{
bufferingGoal:30,
rebufferingGoal:15,
bufferBehind:30
}

});


/* ADD HEADERS */

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://fancode.com/";

request.headers["User-Agent"]="ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1";

});


try{

await player.load(stream);

console.log("Stream loaded successfully");

}

catch(error){

console.error("Error loading stream",error);

}

}


document.addEventListener("shaka-ui-loaded",initPlayer);

</script>


</body>

</html>
