<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">

<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>

body{
margin:0;
background:#000;
}

.shaka-video-container{
width:100%;
height:100vh;
}

video{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div class="shaka-video-container" data-shaka-player-container>
<video autoplay playsinline data-shaka-player id="video"></video>
</div>

<script>

const video = document.getElementById("video");
const container = document.querySelector(".shaka-video-container");

const player = new shaka.Player(video);
const ui = new shaka.ui.Overlay(player, container, video);

ui.configure({
controlPanelElements:[
'play_pause',
'mute',
'time_and_duration',
'spacer',
'fullscreen'
]
});


player.getNetworkingEngine().registerRequestFilter((type,request)=>{
request.headers["Referer"]="https://fancode.com/";
});


async function start(){

try{

const params = new URLSearchParams(window.location.search);
const idParam = params.get("id");

if(!idParam){
alert("No id in URL");
return;
}

const matchId = idParam.split("_")[0];

const res = await fetch("https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json");
const data = await res.json();

const match = data.matches.find(m=>m.match_id==matchId);

if(!match){
alert("Match not found");
return;
}

const playlist = match.auto_streams[0].auto;

const lines = playlist.split("\n");

let streams=[];

for(let i=0;i<lines.length;i++){

if(lines[i].includes("RESOLUTION")){

let q = lines[i].match(/RESOLUTION=\d+x(\d+)/)[1];
let url = lines[i+1];

streams.push({
quality:q,
url:url
});

}

}

console.log("Streams:",streams);

if(streams.length===0){
alert("No streams found");
return;
}

await player.load(streams[4].url); // load 720p

video.play();

}catch(e){

console.error("Player error:",e);

}

}

start();

</script>

</body>
</html>
