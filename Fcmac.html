<script>

const video = document.getElementById("video");
const container = document.querySelector(".shaka-video-container");

const player = new shaka.Player(video);
const ui = new shaka.ui.Overlay(player, container, video);

ui.configure({
controlPanelElements:[
'play_pause',
'mute',
'time_and_duration',
'spacer',
'settings',
'fullscreen'
]
});

player.configure({
streaming:{
bufferingGoal:10,
rebufferingGoal:2,
bufferBehind:30
}
});

/* HEADERS */

player.getNetworkingEngine().registerRequestFilter((type,request)=>{
request.headers["Referer"]="https://fancode.com/";
request.headers["User-Agent"]="ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1";
});


/* GET MATCH ID */

const params = new URLSearchParams(window.location.search);
const idParam = params.get("id");

const matchId = idParam.split("_")[0];

const match = matches.find(m=>m.match_id==matchId);

const playlistText = match.auto_streams[0].auto;


/* EXTRACT QUALITY STREAMS */

const lines = playlistText.split("\n");

let streams=[];

for(let i=0;i<lines.length;i++){

if(lines[i].includes("RESOLUTION")){

let quality = lines[i].match(/RESOLUTION=\d+x(\d+)/)[1];
let url = lines[i+1];

streams.push({
label: quality+"p",
url:url
});

}

}


/* LOAD DEFAULT QUALITY */

async function loadStream(url){

let currentTime = video.currentTime || 0;

await player.load(url);

video.currentTime=currentTime;

video.play();

}

loadStream(streams[4].url); // default 720p


/* CREATE QUALITY MENU INSIDE SETTINGS */

const settingsButton = document.querySelector(".shaka-settings-button");

const qualityMenu = document.createElement("div");

qualityMenu.style.position="absolute";
qualityMenu.style.bottom="60px";
qualityMenu.style.right="60px";
qualityMenu.style.background="#111";
qualityMenu.style.padding="10px";
qualityMenu.style.display="none";

streams.forEach(stream=>{

let btn=document.createElement("div");

btn.innerText=stream.label;

btn.style.color="#fff";
btn.style.padding="5px";
btn.style.cursor="pointer";

btn.onclick=()=>{
loadStream(stream.url);
qualityMenu.style.display="none";
};

qualityMenu.appendChild(btn);

});

container.appendChild(qualityMenu);


settingsButton.onclick=()=>{
qualityMenu.style.display=
qualityMenu.style.display==="none"?"block":"none";
};

</script>
