<!DOCTYPE html>
<html lang="en">
<head>
  <title>Live Stream Player</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>
  <style>
    body { background:#000; margin:0; overflow:hidden; }
    html, body { height:100%; }
    video { width:100%; height:100%; }
    .plyr { height:100%; }
  </style>
</head>
<body>

<video id="player" autoplay muted controls crossorigin playsinline></video>

<script src="https://lchdxfootball.pages.dev/premium.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const video = document.getElementById('player');

  // Get stream ID from URL
  const params = new URLSearchParams(window.location.search);
  const streamId = params.get('id');

  if (!streamId || !streamMap[streamId]) {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;'>Invalid Stream ID</h2>";
    return;
  }

  const source = streamMap[streamId].url;
  const poster = streamMap[streamId].poster;

  if (poster) video.setAttribute("poster", poster);

  if (Hls.isSupported()) {

    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,

      xhrSetup: function(xhr, url) {
        try {
          xhr.setRequestHeader(
            "Referer",
            "https://fancode.com/"
          );

          xhr.setRequestHeader(
            "User-Agent",
            "ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1"
          );
        } catch(e) {}
      }
    });

    hls.loadSource(source);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {

      const availableQualities = hls.levels.map(level => level.height);
      availableQualities.unshift(0);

      const player = new Plyr(video, {
        controls: ['play-large','play','mute','volume','settings','fullscreen'],
        quality: {
          default: 0,
          options: availableQualities,
          forced: true,
          onChange: (quality) => {
            if (quality === 0) {
              hls.currentLevel = -1;
            } else {
              hls.levels.forEach((level, i) => {
                if (level.height === quality) {
                  hls.currentLevel = i;
                }
              });
            }
          }
        }
      });

      player.play();

    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

    video.src = source;
    new Plyr(video);

  } else {
    document.body.innerHTML = "<h2 style='color:white;text-align:center;'>HLS not supported</h2>";
  }

});

// Auto landscape on fullscreen
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    screen.orientation?.lock?.('landscape').catch(()=>{});
  } else {
    screen.orientation?.unlock?.().catch(()=>{});
  }
});
</script>

</body>
</html>
