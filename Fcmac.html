<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SHAKA PLAYER</title>

<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

<style>

body{
margin:0;
background:#000;
height:100%;
}

html{
height:100%;
}

.shaka-video-container{
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div class="shaka-video-container">
<video id="video" playsinline autoplay></video>
</div>

<script>

const channelstreamInfo = {

streamUrl: "https://islstream.xojiv79335.workers.dev/?id=140992_ENGLISH"

};

let player;
const video = document.getElementById('video');

async function initializePlayer(){

try{

player = new shaka.Player();

await player.attach(video);


const container=document.querySelector('.shaka-video-container');

const ui=new shaka.ui.Overlay(player,container,video);


const config={

seekBarColors:{
base:'rgba(255,255,255,.2)',
buffered:'rgba(255,255,255,.4)',
played:'rgb(255,0,0)',
},

controlPanelElements:[
'play_pause',
'mute',
'time_and_duration',
'restart',
'spacer',
'quality',
'language',
'picture_in_picture',
'fullscreen',
'overflow_menu'
]

};

ui.configure(config);


player.configure({

  abr: {
    enabled: true
  },

  streaming: {
    bufferingGoal: 10,
    rebufferingGoal: 2,
    bufferBehind: 30
  },

  manifest: {
    retryParameters: {
      timeout: 30000,
      maxAttempts: 2,
      baseDelay: 1000,
      backoffFactor: 2,
      fuzzFactor: 0.5
    }
  }

});

/* HEADER INJECTION */

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://fancode.com/";

request.headers["User-Agent"]="ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1";

});


video.autoplay=true;
video.controls=false;
video.volume=1;
video.muted=false;
video.preload='auto';


console.log("Loading stream:",channelstreamInfo.streamUrl);


await player.load(channelstreamInfo.streamUrl);

console.log("Stream loaded successfully");


const attemptAutoplay=async()=>{

try{

await video.play();

console.log("Autoplay success");

}

catch(e){

video.muted=true;

try{

await video.play();

console.log("Autoplay success muted");

}

catch(e2){

console.log("User interaction required");

}

}

};


if(video.readyState>=2){

await attemptAutoplay();

}

else{

video.addEventListener("canplay",attemptAutoplay,{once:true});

}


}

catch(error){

console.error("Error initializing player:",error);

video.src=channelstreamInfo.streamUrl;

video.autoplay=true;
video.muted=false;

try{

await video.play();

}

catch(e){

video.muted=true;

await video.play();

}

}

}


document.addEventListener("DOMContentLoaded",()=>{

initializePlayer().catch(console.error);

});

</script>

</body>
</html>
