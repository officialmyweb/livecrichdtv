<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>OpenF1 Ultimate Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="app.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
🏁 OpenF1 Ultimate Timing Dashboard
</header>

<div class="grid">

<div class="card">
<h3>Meetings</h3>
<div id="meetings"></div>
</div>

<div class="card">
<h3>Sessions</h3>
<div id="sessions"></div>
</div>

<div class="card">
<h3>Weather</h3>
<div id="weather"></div>
</div>

<div class="card">
<h3>Drivers</h3>
<table id="drivers"></table>
</div>

<div class="card">
<h3>Leaderboard</h3>
<table id="position"></table>
</div>

<div class="card">
<h3>Intervals</h3>
<table id="intervals"></table>
</div>

<div class="card">
<h3>Laps</h3>
<table id="laps"></table>
</div>

<div class="card">
<h3>Pit Stops</h3>
<table id="pit"></table>
</div>

<div class="card">
<h3>Tyre Stints</h3>
<table id="stints"></table>
</div>

<div class="card">
<h3>Overtakes</h3>
<div id="overtakes"></div>
</div>

<div class="card">
<h3>Race Control</h3>
<div id="racecontrol"></div>
</div>

<div class="card">
<h3>Starting Grid</h3>
<table id="grid"></table>
</div>

<div class="card">
<h3>Session Results</h3>
<table id="results"></table>
</div>

<div class="card">
<h3>Telemetry</h3>
<canvas id="speedChart"></canvas>
</div>

<div class="card">
<h3>Car Location</h3>
<div id="track"></div>
</div>

<div class="card">
<h3>Team Radio</h3>
<div id="radio"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
