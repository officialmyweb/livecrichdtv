<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:6%;
transform:translateY(-50%);
font-size:11px;
font-weight:600;
color:rgba(255,255,255,0.12);
}

.block-overlay{
position:fixed;
inset:0;
z-index:99999;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
text-align:center;
}

.block-box{
padding:40px;
max-width:500px;
width:90%;
background:rgba(20, 20, 20, 0.95);
border-radius:16px;
border:1px solid rgba(255, 255, 255, 0.1);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(30px); }
to { opacity: 1; transform: translateY(0); }
}

.block-title{
font-size:42px;
font-weight:800;
color:#ffffff;
text-transform:uppercase;
letter-spacing:2px;
margin-bottom:20px;
}

.block-sub{
font-size:14px;
color:rgba(255,255,255,0.6);
line-height:1.6;
}

@media(max-width:700px){
.custom-watermark{font-size:9px;top:60%;left:16%}
.block-title{font-size:28px}
.block-box{padding:25px}
.block-sub{font-size:12px}
}
</style>

<body>

<div class="shaka-video-container shaka-mobile" id="player-container" shaka-controls="true">
  <video id="video" autoplay muted playsinline preload="metadata" class="shaka-video"></video>
  <div class="custom-watermark"></div>
</div>

<script>
(function(){

function isSandboxedEnv(){
  try {
    if (window.self === window.top) return false;
    if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true;
    try { document.domain = document.domain; } catch (e) { return true; }
    return false;
  } catch(e) { return true; }
}

function triggerBlockScreen(title, message){
  const container = document.getElementById("player-container");
  const video = document.getElementById("video");

  try {
    video.pause();
    video.removeAttribute('src');
    video.load();
  } catch(e){}

  const overlay = document.createElement("div");
  overlay.className = "block-overlay";
  overlay.innerHTML = `
    <div class="block-box">
      <div class="block-title">${title}</div>
      <div class="block-sub">${message}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  container.style.display = 'none';
}

if(isSandboxedEnv()){
  triggerBlockScreen('Disable Sandbox', 'Opening Chrome Browser Only & Disable Ad blocker');
  return;
}


// 🔥 STREAM DATABASE
const STREAMS = [
{id:"SSS1HD", url:"https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_Select_HD_1_BTS/output/index.mpd", keyId:"c2c048e439d65316beeda6ef64d5d0f8", key:"e2fdc132cbdee65501b845ce414fce39"},

];

// 🔍 GET ID
function getStream(){
  const id = new URLSearchParams(location.search).get("id") || "SS1HD";
  return STREAMS.find(s=>s.id===id) || STREAMS[0];
}

const selected = getStream();

const CONFIG={
  streamUrl:selected.url,
  keyId:selected.keyId,
  key:selected.key,
  cookieUrl:"https://allrounder-live2.pages.dev/api/cookie.json"
};


document.addEventListener("DOMContentLoaded",async()=>{

  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()) return;

  const video=document.getElementById("video");
  const container=document.getElementById("player-container");

  const player=new shaka.Player();
  await player.attach(video);

  const ui=new shaka.ui.Overlay(player,container,video);

  ui.configure({
    addBigPlayButton:true,
    controlPanelElements:[
      "mute","play_pause","time_and_duration","spacer","quality","picture_in_picture","fullscreen"
    ],
    seekBarColors:{base:"white",buffered:"red",played:"green"}
  });

  player.configure({
    drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
    manifest:{defaultPresentationDelay:5},
    streaming:{
      lowLatencyMode:true,
      bufferingGoal:10,
      rebufferingGoal:2,
      safeSeekOffset:5
    }
  });

  let cookie="";

  try{
    const res=await fetch(CONFIG.cookieUrl,{cache:"no-store"});
    const data=await res.json();
    cookie=data.cookie||"";
  }catch(e){}

  if(cookie){
    player.getNetworkingEngine().registerRequestFilter((type,request)=>{
      request.headers["Referer"]="https://www.jiotv.com/";
      request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
      request.headers["Cookie"]=cookie;

      let c=cookie.startsWith("__hdnea__=")?cookie.substring(10):cookie;

      if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST||
      type===shaka.net.NetworkingEngine.RequestType.SEGMENT)&&
      !request.uris[0].includes("__hdnea__")){
        const sep=request.uris[0].includes("?")?"&":"?";
        request.uris[0]+=sep+"__hdnea__="+c;
      }
    });
  }

  try{
    await player.load(CONFIG.streamUrl);
    video.play().catch(()=>{});
  }catch(e){}

  video.addEventListener("play",()=>{ video.muted=false; });

});

})();
</script>
