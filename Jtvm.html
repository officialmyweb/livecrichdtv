<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      color: #fff;
      text-align: center;
      padding: 12px;
      font-size: 18px;
      background: #111;
      letter-spacing: 1px;
    }

    .iframe-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay-block {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: transparent;
      z-index: 10;
    }

    .footer {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      padding: 6px;
      background: #111;
    }
  </style>
</head>

<body>

  <div class="header">LIVE STREAM</div>

  <div class="iframe-container">
    <!-- Click blocker (reduces popup triggers) -->
    <div class="overlay-block"></div>

    <iframe 
      src="https://latamvidz1.com/canal.php?stream=event3"
      allow="fullscreen; autoplay"
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <div class="footer">If stream doesn't load, refresh the page.</div>

</body>
</html>
