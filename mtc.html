<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telegram-cricXfootball</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; }

    .shaka-video-container { position: absolute; inset: 0; }
    video { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>

<body>

<!-- ✅ VIDEO (missing tha) -->
<div class="shaka-video-container">
  <video></video>
</div>

<script>

if (confirm("Join Our Telegram Channel @livecrichdofficial")) {
  window.location.href = "https://telegram.me/+L7agYSmJVRNkZDFl";
}

document.addEventListener('DOMContentLoaded', async () => {

  // ✅ DIRECT PLAYER START (popup logic untouched)
  initializePlayer();

  async function initializePlayer() {

    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;

    const tvgId = new URLSearchParams(window.location.search).get('tvid');
    if (!tvgId) return;

    const COOKIE = "__hdnea__=st=1773844261~exp=1773865861~acl=/*~hmac=5a47de28e8c4964b93c1609443db1f34df10d3fce1ecc2e09e6a1d62e283c593";

    // ✅ SAME CHANNELS (unchanged)
    const sonyLivSports = {
      'SN1': { name: 'Sony LIV Sports 1', streamUrl: 'https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_1_MOB/WDVLive/index.mpd', clearKey: { keyId: '4e4c5dba5bfe5a7c9338bc086eb80379', key: 'b8e8932f440084e1d2b705fa52eef94b' } },
      'SN2': { name: 'Sony LIV Sports 2', streamUrl: 'https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_2_MOB/WDVLive/index.mpd', clearKey: { keyId: 'ef24516ae38b50d18049343cd1cd998a', key: 'eb4810ec250a1795a0019dba7881ff45' } },
      'SN3': { name: 'Sony LIV Sports 3', streamUrl: 'https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_3_MOB/WDVLive/index.mpd', clearKey: { keyId: '3afa887864e6545aa006db21aeb39054', key: '6b8cce271f3cd923d0df32d45b44f6df' } },
      'SN4': { name: 'Sony LIV Sports 5', streamUrl: 'https://jiotvpllive.cdn.jio.com/bpk-tv/SonyLIV_Sports_5_MOB/WDVLive/index.mpd', clearKey: { keyId: 'cee8550bf50b569d8ad2ed0c5264f0d2', key: '565a95f1c332c03534e1e5fcc1ff9a8b' } }
    };

    if (!sonyLivSports[tvgId]) return;

    const channelData = Object.assign({ cookie: COOKIE }, sonyLivSports[tvgId]);

    document.title = channelData.name + ' - JioTV Player';

    const video  = document.querySelector('video');
    const player = new shaka.Player();
    await player.attach(video);

    const ui = new shaka.ui.Overlay(player, document.querySelector('.shaka-video-container'), video);

    let drmConfig = {};
    if (channelData.clearKey) {
      drmConfig = {
        clearKeys: {
          [channelData.clearKey.keyId]: channelData.clearKey.key
        }
      };
    }

    player.configure({ drm: drmConfig });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {

      request.headers['Referer']    = 'https://www.jiotv.com/';
      request.headers['User-Agent'] = 'plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0';

      if (channelData.cookie) {
        request.headers['Cookie'] = channelData.cookie;
      }

      if (
        channelData.cookie &&
        (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
         type === shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
        request.uris[0] &&
        !request.uris[0].includes('__hdnea__=')
      ) {
        const sep = request.uris[0].includes('?') ? '&' : '?';
        request.uris[0] += sep + channelData.cookie;
      }
    });

    try {
      await player.load(channelData.streamUrl);
      video.play();
    } catch (e) {
      console.log("Playback failed");
    }
  }

});
</script>

</body>
</html>
