<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Iframe Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial;
  }

  iframe {
    width: 100%;
    height: 100vh;
    border: none;
  }

  .controls {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
  }

  select {
    padding: 8px;
    font-size: 16px;
  }
</style>
</head>

<body>

<div class="controls">
  <select id="streamSelect"></select>
</div>

<iframe 
  id="player"
  sandbox="allow-scripts allow-same-origin allow-forms"
  referrerpolicy="no-referrer"
></iframe>

<script src="https://lchdxfootball.pages.dev/adds.js"></script>

<script>
const iframe = document.getElementById("player");
const select = document.getElementById("streamSelect");

// Populate dropdown
for (let key in streams) {
  const option = document.createElement("option");
  option.value = key;
  option.textContent = key;
  select.appendChild(option);
}

// Load stream
function loadStream(id) {
  let url = streams[id];

  if (!url || url === "#") {
    iframe.src = "about:blank";
    return;
  }

  iframe.src = url;
}

// Change stream
select.addEventListener("change", () => {
  loadStream(select.value);
});

// Load default
loadStream(Object.keys(streams)[0]);

// 🔒 Block iframe redirect attempts
iframe.addEventListener("load", () => {
  try {
    const iframeWindow = iframe.contentWindow;

    // Prevent top navigation
    iframeWindow.open = () => null;

    iframeWindow.document.addEventListener("click", function(e) {
      let link = e.target.closest("a");

      if (link) {
        e.preventDefault();
        console.log("Blocked redirect:", link.href);
      }
    });

  } catch (e) {
    console.log("Cross-origin (cannot control iframe)");
  }
});
</script>

</body>
</html>
